<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Client Flow</title>
  </head>
  <body>
    <header>
      <div id="logoCont">
        <p class="logo">ClientFlow</p>
      </div>
      <div id="manageApptCont">
        <div class="manageApptHeader">
          <h1>Manage Appointments</h1>
        </div>
        <div class="searchBarAppt">
          <input
            id="searchBar"
            type="search"
            name="appointmentSearchBar"
            aria-label="Search appointments"
            placeholder="Search Appointments"
          />
          <button id="addApptBtn">Add Appointment</button>
        </div>
      </div>
    </header>
    <main>
      <section id="apptSummary">
        <div id="todayApptTracker">
          <p>Today</p>
        </div>
        <div id="upcomingApptTracker">
          <p>Upcoming</p>
        </div>
        <div id="completedApptTracker"><p>Completed</p></div>
        <div id="allApptTracker"><p>All</p></div>
      </section>
      <section id="appointmentCardsCont"></section>
    </main>

    <div class="form-popup hideForm" id="formContainer">
      <form id="addApptForm">
        <button class="closeApptBtn" type="button">X</button>
        <h1>Add Appointment</h1>

        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          placeholder="Enter Full Name"
          name="name"
          required
        />

        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Enter Phone" name="phone" />

        <label for="dateTime">Scheduled Time</label>
        <input type="datetime-local" id="dateTime" name="dateTime" required />

        <button type="submit" id="submitApptBtn">SUBMIT</button>
      </form>
    </div>

    <script src="index.js" defer></script>
  </body>
</html>
