<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Client Flow</title>
  </head>
  <body>
    <header>
      <div id="logoCont">
        <p class="logo">ClientFlow</p>
      </div>
      <div id="manageApptCont">
        <div class="manageApptHeader">
          <h1>Manage Appointments</h1>
          <p>Track, update, and organize upcoming client visits</p>
        </div>
        <div class="searchBarAppt">
          <input
            id="searchBar"
            type="search"
            name="appointmentSearchBar"
            aria-label="Search appointments"
            placeholder="Search Appointments"
          />
          <button id="addApptBtn">Add Appointment</button>
        </div>
      </div>
    </header>
    <main>
      <section id="apptSummary">
        <div id="todayApptTracker">
          <p>Today</p>
          <p id="todayApptCount"></p>
        </div>
        <div id="upcomingApptTracker">
          <p>Upcoming</p>
          <p id="upcomingApptCount"></p>
        </div>
        <div id="completedApptTracker">
          <p>Completed</p>
          <p id="completedApptCount"></p>
        </div>
        <div id="allApptTracker">
          <p>All</p>
          <p id="allApptCount"></p>
        </div>
      </section>
      <section id="appointmentCardsCont">
        <div class="noMatchingApptsCont">
          <p id="noMatchingAppts"></p>
        </div>
      </section>
    </main>

    <div class="form-popup" id="formContainer">
      <form id="addApptForm">
        <button class="closeApptBtn" type="button">X</button>
        <h1>Add Appointment</h1>
        <div class="fullNameCont">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            placeholder="Enter Full Name"
            name="name"
          />
          <p class="nameErrorMsg">Please enter your full name.</p>
        </div>
        <div class="phoneCont">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" placeholder="Enter Phone" name="phone" />
          <p class="phoneErrorMsg">Please enter a valid phone number.</p>
        </div>
        <div class="dateTimeCont">
          <label for="dateTime">Scheduled Time</label>
          <input type="datetime-local" id="dateTime" name="dateTime" required />
        </div>
        <button type="submit" id="submitApptBtn">SUBMIT</button>
      </form>
    </div>

    <script src="index.js" defer></script>
  </body>
</html>
